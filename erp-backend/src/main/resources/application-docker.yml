# application-docker.yml - CORRIGIDO
spring:
  application:
    name: zylo-erp

  # Configuração PADRÃO (usada quando nenhum profile ativo)
  datasource:
    url: jdbc:postgresql://localhost:5432/zylo_erp  # MUDADO para localhost
    username: zylo
    password: "123456"
    driver-class-name: org.postgresql.Driver

    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
    open-in-view: false

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
    clean-disabled: true  # HABILITA limpeza

    # ⚡ SUPER IMPORTANTE:
    out-of-order: true  # Permite migrações fora de ordem (útil para dev)
    validate-on-migrate: false  # Desativa validação (resolve checksum)
    repair-on-migrate: true  # Repara automaticamente

  jackson:
    time-zone: America/Sao_Paulo
    deserialization:
      fail-on-unknown-properties: false

    # Configuração do Servidor
  server:
    port: 8080 # ALINHADO COM O DOCKER
    # servlet:
    #   context-path: /v2  <-- Removido para simplificar URLs de acesso

# Logging
  logging:
    level:
      root: INFO
      com.zyloerp: DEBUG
      org.hibernate.SQL: DEBUG
    pattern:
      console: "%d{HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

# Segurança Simplificada
  jwt:
    # Chave simples para estudo (Base64 encoded "segredo123" para evitar erro de parse)
    secret: "c2VncmVkb211aXRvc2VndXJvcGFyYWVzdHVkYXJqYXZhc3ByaW5nYm9vdA=="
    expiration: 86400000 # 24 horas (para não expirar durante seus testes)
    issuer: "Zylo ERP"

  springdoc:
    api-docs:
      path: /api-docs
    swagger-ui:
      path: /swagger-ui.html
      operations-sorter: method

  app:
    name: "Zylo ERP - Study"
    version: "1.0.0"

  security:
    allowed-origins: "*" # Libera tudo para facilitar testes locais

  upload:
    max-file-size: 10MB
    max-request-size: 10MB
---
# Profile DOCKER (ativa com SPRING_PROFILES_ACTIVE=docker)
spring:
  config:
    activate:
      on-profile: docker
  datasource:
    url: jdbc:postgresql://postgres:5432/zylo_erp  # Docker usa 'postgres' como host
    username: zylo
    password: "123456"