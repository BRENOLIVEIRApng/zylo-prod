spring:
  application:
    name: zylo-erp

  # Configuração do Banco de Dados (Recebe valores do Docker Environment)
  datasource:
    url: jdbc:postgresql://postgres:5432/zylo_erp
    username: zylo
    password: "123456"
    driver-class-name: org.postgresql.Driver

    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true # Útil ver o SQL no console para estudo
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
    open-in-view: false

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
    validate-on-migrate: true
    clean-disable: true

  jackson:
    time-zone: America/Sao_Paulo
    deserialization:
      fail-on-unknown-properties: false

  # Configuração do Servidor
server:
  port: 8080 # ALINHADO COM O DOCKER
  # servlet:
  #   context-path: /v2  <-- Removido para simplificar URLs de acesso

# Logging
logging:
  level:
    root: INFO
    com.zyloerp: DEBUG
    org.hibernate.SQL: DEBUG
  pattern:
    console: "%d{HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

# Segurança Simplificada
jwt:
  # Chave simples para estudo (Base64 encoded "segredo123" para evitar erro de parse)
  secret: "c2VncmVkb211aXRvc2VndXJvcGFyYWVzdHVkYXJqYXZhc3ByaW5nYm9vdA=="
  expiration: 86400000 # 24 horas (para não expirar durante seus testes)
  issuer: "Zylo ERP"

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method

app:
  name: "Zylo ERP - Study"
  version: "1.0.0"

  security:
    allowed-origins: "*" # Libera tudo para facilitar testes locais

  upload:
    max-file-size: 10MB
    max-request-size: 10MB

---
# Profile específico para quando roda no Docker
spring:
  config:
    activate:
      on-profile: docker