spring:
  application:
    name: zylo-erp

  # Banco PostgreSQL LOCAL
  datasource:
    url: jdbc:postgresql://localhost:5432/zylo_erp
    username: zylo
    password: "123456"
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
    open-in-view: false

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
    validate-on-migrate: true
    clean-disable: true

  main:
    allow-bean-definition-overriding: true

cors:
  allowed-origins: http://localhost:3000,http://localhost:5500
  allowed-methods: GET,POST,PUT,DELETE,OPTIONS
  allowed-headers: Authorization,Content-Type,Accept,X-Requested-With,Cache-Control
  allow-credentials: true
  max-age: 3600

# JWT
jwt:
  secret: "c2VncmVkb211aXRvc2VndXJvcGFyYWVzdHVkYXJqYXZhc3ByaW5nYm9vdA=="
  expiration: 86400000
  issuer: "Zylo ERP"

# Servidor
server:
  port: 8080

# Logs
logging:
  level:
    root: INFO
    com.zyloerp: DEBUG
    org.hibernate.SQL: DEBUG