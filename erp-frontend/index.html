<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zylo ERP · Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="auth-wrapper">

    <!-- Painel esquerdo -->
    <div class="auth-panel-left">
        <div class="auth-brand">
            <div class="auth-brand-logo">
                <i class="bi bi-grid-3x3-gap-fill"></i>
            </div>
            <h1>Zylo ERP</h1>
            <p>Portal de Gestão para Software Houses</p>
        </div>

        <div class="auth-features">
            <div class="auth-feature-item">
                <div class="feat-icon"><i class="bi bi-buildings"></i></div>
                <span>Gestão completa de clientes e contratos</span>
            </div>
            <div class="auth-feature-item">
                <div class="feat-icon"><i class="bi bi-kanban"></i></div>
                <span>Ordens de serviço com Kanban integrado</span>
            </div>
            <div class="auth-feature-item">
                <div class="feat-icon"><i class="bi bi-receipt"></i></div>
                <span>Faturamento automático recorrente</span>
            </div>
            <div class="auth-feature-item">
                <div class="feat-icon"><i class="bi bi-shield-lock"></i></div>
                <span>Controle de acesso RBAC granular</span>
            </div>
        </div>
    </div>

    <!-- Painel direito - formulário -->
    <div class="auth-panel-right">

        <div class="auth-form-header">
            <h2>Bem-vindo de volta</h2>
            <p>Acesse sua conta para continuar</p>
        </div>

        <form id="loginForm" novalidate>

            <!-- Email -->
            <div class="mb-3">
                <label for="email" class="form-label">Email</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-envelope"></i></span>
                    <input type="email" id="email" name="email" class="form-control"
                           placeholder="seu@email.com" autocomplete="email" required>
                </div>
            </div>

            <!-- Senha -->
            <div class="mb-3">
                <div class="d-flex justify-content-between align-items-center">
                    <label for="senha" class="form-label mb-0">Senha</label>
                    <a href="reset-password.html" style="font-size:.78rem;">Esqueceu a senha?</a>
                </div>
                <div class="input-group mt-1">
                    <span class="input-group-text"><i class="bi bi-lock"></i></span>
                    <input type="password" id="senha" name="senha" class="form-control"
                           placeholder="Mínimo 8 caracteres" autocomplete="current-password" required>
                    <!-- --Toggle visibilidade da senha -->
                    <button class="btn btn-outline-secondary" type="button" id="toggleSenha"
                            style="border-left:none;" tabindex="-1">
                        <i class="bi bi-eye"></i>
                    </button>
                </div>
            </div>

            <!-- Lembrar-me -->
            <div class="mb-4 d-flex align-items-center gap-2">
                <input type="checkbox" id="lembrarMe" class="form-check-input" style="margin-top:0;">
                <label for="lembrarMe" style="font-size:.875rem; color:var(--text-secondary); cursor:pointer;">
                    Lembrar meu acesso
                </label>
            </div>

            <div id="alertContainer"></div>

            <!-- --Entrar -->
            <button type="submit" id="btnLogin" class="btn btn-primary w-100 mt-1">
                <i class="bi bi-box-arrow-in-right"></i>
                Entrar
            </button>

        </form>

        <p class="text-center mt-4" style="font-size:.78rem; color:var(--text-muted);">
            Zylo ERP v1.0 &copy; <span id="anoAtual"></span>
        </p>

    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<!-- auth.js primeiro — ZyloAuth e ZyloUI dependem da ordem correta -->
<script src="js/core/auth.js"></script>
<script src="js/core/utils.js"></script>
<script>
    // --Redirecionar se já autenticado
    ZyloAuth.redirectIfLogado();

    document.getElementById('anoAtual').textContent = new Date().getFullYear();

    // --Toggle de visibilidade da senha
    document.getElementById('toggleSenha')
      .addEventListener('click', () => ZyloUI.toggleSenha('senha', 'toggleSenha'));

    // --Submit de login
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      ZyloUI.clearAlert('alertContainer');

      const email = document.getElementById('email').value.trim();
      const senha = document.getElementById('senha').value;
      const btn   = document.getElementById('btnLogin');

      if (!email || !senha) {
        ZyloUI.showAlert('alertContainer', 'Preencha todos os campos.', 'error');
        return;
      }

      ZyloUI.btnLoading(btn, true, 'Entrando...');

      try {
        await ZyloAuth.login(email, senha);
        ZyloUI.showAlert('alertContainer', 'Login realizado! Redirecionando...', 'success');
        setTimeout(() => { window.location.href = 'pages/dashboard/home.html'; }, 800);
      } catch (err) {
        ZyloUI.showAlert('alertContainer', err.message || 'Erro ao realizar login.', 'error');
        ZyloUI.btnLoading(btn, false);
      }
    });
</script>
</body>
</html>
